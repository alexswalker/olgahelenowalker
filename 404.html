<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found – Olga Heleno Walker</title>
  <meta name="robots" content="noindex, follow">

  <meta name="theme-color" content="#4f6a55" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1a17" media="(prefers-color-scheme: dark)">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preload" href="fonts/dm-sans-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/dm-serif-display-400.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 300 500;
      font-display: swap;
      src: url('fonts/dm-sans-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    @font-face {
      font-family: 'DM Serif Display';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/dm-serif-display-400.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    :root {
      --ink: #2b2925;
      --paper: #f5f1e8;
      --accent: #4f6a55;
      --mid: #6f6a61;
      --rule: #e0d9cb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .wrap { max-width: 480px; }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    p {
      color: var(--mid);
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .home-link {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 2px;
      padding: 0.7rem 1.4rem;
      transition: background 0.2s, color 0.2s;
    }

    .home-link:hover, .home-link:focus-visible {
      background: var(--accent);
      color: var(--paper);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e9e4d9;
        --paper: #1c1a17;
        --accent: #8fb088;
        --mid: #9a948a;
        --rule: #322e28;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">Error 404</p>
    <h1>Page not found</h1>
    <p>The page you were looking for doesn't exist or has moved. Let's get you back on track.</p>
    <a class="home-link" href="/">Return to homepage</a>
  </main>
</body>
</html>
